display_information:
  name: LeaveBot
  description: Leave notifications with L1/L2 approve/reject actions.
features:
  bot_user:
    display_name: LeaveBot
    always_online: true
oauth_config:
  scopes:
    bot:
      - chat:write
      - im:write
      - users:read
settings:
  interactivity:
    is_enabled: true
  socket_mode_enabled: true
  org_deploy_enabled: false
  token_rotation_enabled: false
